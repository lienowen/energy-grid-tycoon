name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Validate content and assets
        run: npm run check:content
      - name: Unit tests
        run: npm test
      - name: Typecheck and production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3
