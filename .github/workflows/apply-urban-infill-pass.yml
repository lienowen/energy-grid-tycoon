name: Apply urban infill pass

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-urban-infill-pass.py
      - .github/workflows/apply-urban-infill-pass.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply urban infill pass
        run: python scripts/apply-urban-infill-pass.py

      - name: Commit urban infill pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/presentation/pixi/ImmersivePixiWorld.ts src/presentation/layout/LevelSceneLayoutRegistry.ts src/presentation/CitySceneMapper.test.ts
          git commit -m "feat: fill city gaps with low-rise urban fabric"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
