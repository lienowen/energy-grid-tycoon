name: Refine commercial infill bounds

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/refine-infill-bounds.py
      - .github/workflows/refine-infill-bounds.yml

permissions:
  contents: write

jobs:
  refine:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Refine infill bounds
        run: python scripts/refine-infill-bounds.py

      - name: Commit refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/presentation/CommercialCityLifePlanner.ts src/presentation/CommercialCityLifePlanner.test.ts
          git commit -m "fix: keep low-rise infill inside the city core"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
