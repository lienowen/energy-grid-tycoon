name: Apply city continuity pass

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-city-continuity-pass.py
      - .github/workflows/apply-city-continuity-pass.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply continuity pass
        run: python scripts/apply-city-continuity-pass.py

      - name: Commit continuity pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/presentation/pixi/ImmersivePixiWorld.ts
          git commit -m "feat: connect districts with city fabric and street life"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
