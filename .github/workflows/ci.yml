name: CI

on:
  pull_request:
    branches: [main]

jobs:
  diagnose-content:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate current diagnostic branch
        run: |
          git clone -q --depth 1 --branch ci/diagnose-city-growth https://github.com/${GITHUB_REPOSITORY}.git repo
          cd repo
          node scripts/validate-content.mjs
