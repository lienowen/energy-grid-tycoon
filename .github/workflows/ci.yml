name: CI

on:
  pull_request:
    branches: [main]

jobs:
  diagnose-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Build current diagnostic branch
        run: |
          git clone -q --depth 1 --branch ci/verify-city-growth-final https://github.com/${GITHUB_REPOSITORY}.git repo
          cd repo
          npm install --no-audit --no-fund --silent
          npm run build > build.log 2>&1 || { tail -n 100 build.log; exit 1; }
          tail -n 30 build.log
