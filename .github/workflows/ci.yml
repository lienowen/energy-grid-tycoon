name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Validate content and assets
        run: npm run check:content
      - name: Unit tests
        run: npm test
      - name: Typecheck and production build
        run: npm run build
