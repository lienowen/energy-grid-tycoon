name: Place commercial landmarks

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/place-commercial-landmarks.py
      - .github/workflows/place-commercial-landmarks.yml

permissions:
  contents: write

jobs:
  place:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Place landmarks
        run: python scripts/place-commercial-landmarks.py

      - name: Commit landmark composition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: aggregate solar field and center the main substation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
