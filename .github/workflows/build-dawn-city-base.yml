name: Build Dawn City authored base

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/build-dawn-city-base.py
      - .github/workflows/build-dawn-city-base.yml

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Build city base and switch renderer
        run: python scripts/build-dawn-city-base.py

      - name: Commit authored city base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/commercial/environment/dawn-city-base.svg src/presentation/CommercialCityLifePlanner.ts src/presentation/CommercialCityLifePlanner.test.ts src/presentation/pixi/ImmersivePixiWorld.ts src/resources/asset-catalog-commercial.json
          git commit -m "feat: replace procedural infill with authored Dawn City base"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
