name: Apply commercial presentation policy

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-commercial-vertical-slice.py
      - .github/workflows/apply-commercial-presentation-policy.yml
      - src/presentation/CommercialPresentationPolicy.ts
      - src/presentation/CommercialPresentationPolicy.test.ts

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rebuild branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply one-shot codemod
        run: python scripts/apply-commercial-vertical-slice.py

      - name: Remove one-shot tooling
        run: git rm scripts/apply-commercial-vertical-slice.py .github/workflows/apply-commercial-presentation-policy.yml

      - name: Install
        run: npm ci

      - name: Validate rebuilt presentation
        run: npm run quality

      - name: Commit rebuilt presentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: separate city and grid presentation modes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
